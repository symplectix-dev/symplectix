version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  # Dependabot has announced support for uv,
  # but there are some use cases that are not yet working.
  # See https://github.com/astral-sh/uv/issues/2512.
  # - package-ecosystem: "uv"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
