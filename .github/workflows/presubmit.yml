name: Presubmit

on:
  # Validates the change before it enters the merge queue.
  pull_request:
    branches:
      - main
  # Validates that the change is safe to merge when combined with other
  # queued PRs, tested against the virtual main that includes them.
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Allow reading contents.

jobs:
  pr:
    name: PR
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        run: |
          [[ "${GITHUB_EVENT_PULL_REQUEST_TITLE}" =~ ^[a-z]{1}[a-z/_-]*:\ [a-z]{1}.*[^.]$ ]]
        env:
          GITHUB_EVENT_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}

  ci:
    name: CI

    strategy:
      matrix:
        os:
          - ubuntu-latest
        profile:
          - release

    runs-on: ${{ matrix.os }}

    env:
      # Always use colored output.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - uses: ./.github/actions/check
        with:
          base-sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          mode: presubmit

      - uses: ./.github/actions/cargo
        with:
          profile: ${{ matrix.profile }}
