name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Allow reading contents.

jobs:
  testing:
    name: Testing

    strategy:
      matrix:
        os:
          - ubuntu-latest
        profile:
          - release

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: nix develop ./nix --command bash --noprofile --norc -eo pipefail {0}

    env:
      # Always use colored output.
      CARGO_TERM_COLOR: always
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # https://github.com/nixbuild/nix-quick-install-action/blob/master/action.yml
      - name: Install Nix (without nix-daemon)
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        with:
          nix_conf: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          # restore and save a cache using this key.
          primary-key: nix-${{ matrix.os }}-${{ hashFiles('nix/*.nix', 'nix/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix.
          restore-prefixes-first-match: nix-${{ matrix.os }}-
          # perform gc until the nix store size (in bytes) is at most this number
          # before trying to save a new cache.
          gc-max-store-size-linux: 3G

      - name: Show Nix flake
        shell: bash
        run: nix flake show ./nix

      - name: Restore pre-commit (prek) cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Create user.bazelrc
        shell: bash
        run: |
          # Apply CI-specific settings to every Bazel invocation without requiring
          # --config=ci on each command line.
          echo "common --config=ci" > bazel/bazelrc/user.bazelrc

      # Three caches are used in combination.
      #
      # The disk cache stores build action results on the local filesystem. When the remote
      # cache is also available, Bazel checks the disk cache first and falls back to the
      # remote cache on a miss, so the disk cache acts as an L1 layer that avoids network
      # round-trips for recently built targets. When the remote cache is not available,
      # the disk cache serves as the only persistent store of build artifacts across runs.
      # It is keyed on commit SHA and saved only from main to avoid cache churn from PRs.
      #
      # The repository cache stores raw downloaded archives for external dependencies.
      # The remote cache complements this with --experimental_remote_repo_contents_cache,
      # which caches the evaluated result of repository rules.
      # On a remote hit, repository contents are served from an in-memory filesystem
      # and files are downloaded only when actually needed, avoiding full extraction.
      # On a remote miss, the repository cache avoids re-downloading the archive so
      # the rule can still be re-evaluated without a network fetch. The repository cache
      # is keyed on the MODULE.bazel lockfile and saved on all branches since the key
      # is content-addressed.
      #
      # The remote cache stores both build action results and repository rule results,
      # acting as an L2 cache shared across all CI runs. It is enabled only when
      # BUILDBUDDY_API_KEY is available. Local results are not uploaded to prevent
      # cache poisoning.
      - name: Enable Bazel remote cache
        if: ${{ env.BUILDBUDDY_API_KEY != '' }}
        shell: bash
        run: |
          {
            # If enabled, the remote cache will be used to store the results of reproducible
            # repository rules. If a repository rule needs to be evaluated and its result is
            # already in the remote cache, the contents of the repository will be kept in an
            # in-memory file system and are only downloaded when needed, either by Bazel itself
            # or an action that runs locally.
            #
            # This flag is a startup option and cannot be conditioned on --config=remote
            # (startup:remote is silently ignored by Bazel), so it is written here and only
            # takes effect when this step runs, i.e. when the remote cache is available.
            echo "startup --experimental_remote_repo_contents_cache"
            # Authenticate with the remote cache.
            echo "common:remote --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
            # Activate the remote config, which enables remote_cache and related flags.
            echo "common --config=remote"
          } >> bazel/bazelrc/user.bazelrc

      - name: Restore Bazel repository cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/bazel/repository/
            ~/.cache/bazelisk
          key: bazel-repo-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-repo-${{ matrix.os }}-

      - name: Restore Bazel disk cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/bazel/disk/
          key: bazel-disk-${{ matrix.os }}-${{ github.sha }}
          restore-keys: bazel-disk-${{ matrix.os }}-

      - name: Bazel build
        run: bazel build //...

      - name: Bazel test
        run: bazel test //...

      - name: Save Bazel repository cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/bazel/repository/
            ~/.cache/bazelisk
          key: bazel-repo-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}

      - name: Save Bazel disk cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        # Saving only from main avoids filling the 10GB GitHub Actions cache with PR entries.
        # With remote cache available, disk cache misses on PRs are covered by the remote cache,
        # so this restriction could be removed to allow exact key hits on re-runs of any branch.
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          path: ~/.cache/bazel/disk/
          key: bazel-disk-${{ matrix.os }}-${{ github.sha }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # A format string used to format commands to be run, i.e. `rustc` and `cargo`.
          cmd-format: nix develop ./nix --command {0}
          # The prefix cache key, this can be changed to start a new cache manually.
          prefix-key: "rust-cache-v0"
          # If `true` the workspace crates will be cached.
          # Useful if the workspace contains libraries that are only updated sporadically.
          cache-workspace-crates: "true"
          # To only cache release builds from `main`.
          save-if: ${{ github.ref == 'refs/heads/main' && matrix.profile == 'release' }}

      - name: Run pre-commit hooks (prek)
        run: prek run --skip no-commit-to-branch --show-diff-on-failure --color=always

      - name: Run cargo fmt
        run: cargo fmt --all --check

      - name: Run cargo check
        run: cargo check --locked

      - name: Run cargo clippy
        run: cargo clippy --locked --no-deps --all-targets --all-features

      - name: Run cargo build
        env:
          PROFILE: ${{ matrix.profile }}
        run: cargo build --locked --profile "$PROFILE" --workspace

      - name: Run cargo test
        env:
          PROFILE: ${{ matrix.profile }}
        run: cargo test --locked --profile "$PROFILE" --workspace
