name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testing:
    strategy:
      matrix:
        os:
          - ubuntu-latest
        profile:
          - release

    runs-on: ${{ matrix.os }}

    env:
      # Always use colored output.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # https://github.com/nixbuild/nix-quick-install-action/blob/master/action.yml
      - name: Setup nix w/o nix-daemon
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key.
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix.
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # perform gc until the nix store size (in bytes) is at most this number
          # before trying to save a new cache.
          gc-max-store-size-linux: 2G

      - name: Restore rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # The prefix cache key, this can be changed to start a new cache manually.
          prefix-key: "rust-cache-v0"
          # To only cache release builds from `main`.
          save-if: ${{ github.ref == 'refs/heads/main' && matrix.profile == 'release' }}

      - name: Format
        run: nix develop --command cargo fmt --all --check

      - name: Check
        run: nix develop --command cargo check --frozen

      - name: Lint
        # TODO: add --all-targets when setup criterion for compacts/benches
        run: nix develop --command cargo clippy --frozen --no-deps --all-features

      - name: Build
        run: nix develop --command cargo build --frozen --profile ${{ matrix.profile }} --workspace

      - name: Test
        run: nix develop --command cargo test --frozen --profile ${{ matrix.profile }} --workspace
