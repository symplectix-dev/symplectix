name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testing:
    strategy:
      matrix:
        os:
          - ubuntu-latest
        profile:
          - release

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      # https://github.com/nixbuild/nix-quick-install-action/blob/master/action.yml
      - uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            keep-outputs = true
            keep-env-derivations = true
      - name: Restore nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - run: nix flake show
      - run: nix develop --command cargo run -p devtool -- info
      - uses: Swatinem/rust-cache@v2
        with:
          # The prefix cache key, this can be changed to start a new cache manually.
          prefix-key: "rust-cache-v0"
          # To only cache release builds from `main`.
          save-if: ${{ github.ref == 'refs/heads/main' && matrix.profile == 'release' }}
      - run: nix develop --command cargo fmt --all --check
      - run: nix develop --command cargo clippy --no-deps --all-targets --all-features
      - run: nix develop --command cargo build --profile ${{ matrix.profile }} --workspace
      - run: nix develop --command cargo test --profile ${{ matrix.profile }} --workspace
