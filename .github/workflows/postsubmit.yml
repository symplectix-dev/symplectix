name: Postsubmit

on:
  workflow_dispatch:
  # Verifies the merged state on main and populates caches. merge_group tests
  # a virtual merge; this run catches any divergence on the actual commit.
  push:
    branches:
      - main
  # Runs the full build weekly as a safety net in case selective build in
  # presubmit missed affected targets.
  schedule:
    - cron: '0 21 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read # Allow reading contents.

jobs:
  ci:
    name: CI

    strategy:
      matrix:
        os:
          - ubuntu-latest
        profile:
          - release

    runs-on: ${{ matrix.os }}

    env:
      # Always use colored output.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - uses: ./.github/actions/check
        with:
          # github.event.before is empty on workflow_dispatch.
          base-sha: ${{ github.event.before }}
          mode: postsubmit

      - uses: ./.github/actions/cargo
        with:
          profile: ${{ matrix.profile }}
          save-cache: 'true'
