name: Check
description: Run pre-build checks, build, and test.

inputs:
  base-sha:
    description: Base SHA used to narrow down affected targets.
    default: ''
  mode:
    description: "'presubmit' or 'postsubmit'"

runs:
  using: composite
  steps:
    - name: Validate inputs
      id: validate-inputs
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        BASE_SHA: ${{ inputs.base-sha }}
      run: |
        case "$MODE" in
        postsubmit) ;;
        presubmit)
          [[ -n "$BASE_SHA" ]] || { echo "base-sha is required in presubmit mode"; exit 1; }
          ;;
        *)
          echo "mode must be 'presubmit' or 'postsubmit'"; exit 1
          ;;
        esac
        if [[ -n "$BASE_SHA" ]]; then
          echo "base-sha-short=${BASE_SHA:0:10}" >> "$GITHUB_OUTPUT"
        else
          echo "base-sha-short=(none)"           >> "$GITHUB_OUTPUT"
        fi
        echo "head-sha-short=${GITHUB_SHA:0:10}" >> "$GITHUB_OUTPUT"

    # Skipped on workflow_dispatch where base-sha is empty.
    - name: Fetch base
      if: ${{ inputs.base-sha != '' }}
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
      run: git fetch --depth=1 origin "$BASE_SHA"

    - name: Restore Bazel repository cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.cache/bazel/repository/
          ~/.cache/bazelisk
        key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
        restore-keys: bazel-repo-${{ runner.os }}-

    - name: Restore Bazel disk cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/bazel/disk/
        key: bazel-disk-${{ runner.os }}-${{ github.sha }}
        restore-keys: bazel-disk-${{ runner.os }}-

    - name: Pre-build
      if: ${{ inputs.base-sha != '' }}
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      env:
        BASE_SHA: ${{ inputs.base-sha }}
      run: |
        prek run --group ci --no-group no-ci --from-ref "$BASE_SHA" --show-diff-on-failure --color=always

    - name: Run Buildifier
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      run: bazel test //bazel:buildifier_test

    - name: Restore base (${{ steps.validate-inputs.outputs.base-sha-short }}) hashes
      id: restore-base-hashes
      if: ${{ inputs.mode == 'presubmit' }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/bazel-diff/base.json
        key: bazel-diff-${{ runner.os }}-${{ inputs.base-sha }}

    - name: Ensure ~/.cache/bazel-diff exists
      shell: bash
      run: mkdir -p "$HOME/.cache/bazel-diff"

    - name: Generate base (${{ steps.validate-inputs.outputs.base-sha-short }}) hashes
      if: ${{ inputs.mode == 'presubmit' && steps.restore-base-hashes.outputs.cache-hit != 'true' }}
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      env:
        BASE_SHA: ${{ inputs.base-sha }}
      run: |
        git worktree add "$HOME/.cache/bazel-diff/base" "$BASE_SHA"
        bazel run @bazel-diff//cli:bazel-diff -- generate-hashes \
          --workspacePath="$HOME/.cache/bazel-diff/base" \
          --bazelPath="$(which bazel)" \
          "$HOME/.cache/bazel-diff/base.json"
        git worktree remove --force "$HOME/.cache/bazel-diff/base"

    - name: Generate head (${{ steps.validate-inputs.outputs.head-sha-short }}) hashes
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      run: |
        bazel run @bazel-diff//cli:bazel-diff -- generate-hashes \
          --workspacePath="$PWD" \
          --bazelPath="$(which bazel)" \
          /tmp/head.json

    - name: Stage head (${{ steps.validate-inputs.outputs.head-sha-short }}) hashes as base
      if: ${{ inputs.mode == 'postsubmit' }}
      shell: bash
      run: cp /tmp/head.json "$HOME/.cache/bazel-diff/base.json"

    # Sets is-empty=true when no targets are affected, skipping Build and Test.
    - name: Compute impacted targets
      id: impacted-targets
      if: ${{ inputs.mode == 'presubmit' }}
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      run: |
        bazel run @bazel-diff//cli:bazel-diff -- get-impacted-targets \
          --workspacePath="$PWD" \
          --bazelPath="$(which bazel)" \
          --startingHashes="$HOME/.cache/bazel-diff/base.json" \
          --finalHashes=/tmp/head.json \
          --output=/tmp/impacted.txt

        bazel query "kind(rule, set($(tr '\n' ' ' < /tmp/impacted.txt)))" > /tmp/targets.txt

        mapfile -t targets < /tmp/targets.txt
        if [[ ${#targets[@]} -eq 0 ]]; then
          echo "No impacted targets. Skipping build and test."
          echo "is-empty=true" >> "$GITHUB_OUTPUT"
        else
          echo "Impacted targets (${#targets[@]}):"
          printf '  %s\n' "${targets[@]}"
        fi

    # Saved before Build/Test so the cache is populated even if the build fails.
    - name: Save head (${{ steps.validate-inputs.outputs.head-sha-short }}) hashes
      if: ${{ inputs.mode == 'postsubmit' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/bazel-diff/base.json
        key: bazel-diff-${{ runner.os }}-${{ github.sha }}

    # In presubmit with no targets, is-empty is 'true' and !'true' = false (skip).
    # In postsubmit, impacted-targets is skipped so is-empty is '' and !'' = true (run).
    # /tmp/targets.txt absent, so falls back to `//...`.
    - name: Build
      if: ${{ !steps.impacted-targets.outputs.is-empty }}
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      run: |
        targets=(//...)
        [[ -f /tmp/targets.txt ]] && mapfile -t targets < /tmp/targets.txt
        bazel build "${targets[@]}"

    - name: Test
      if: ${{ !steps.impacted-targets.outputs.is-empty }}
      shell: nix develop ./nix#ci --command bash --noprofile --norc -eo pipefail {0}
      run: |
        targets=(//...)
        [[ -f /tmp/targets.txt ]] && mapfile -t targets < /tmp/targets.txt
        bazel test "${targets[@]}"

    - name: Save Bazel repository cache
      if: ${{ inputs.mode == 'postsubmit' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.cache/bazel/repository/
          ~/.cache/bazelisk
        key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}

    - name: Save Bazel disk cache
      if: ${{ inputs.mode == 'postsubmit' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/bazel/disk/
        key: bazel-disk-${{ runner.os }}-${{ github.sha }}
