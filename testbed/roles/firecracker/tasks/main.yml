- name: Ensure runtime directory exists
  ansible.builtin.file:
    path: /run/testbed
    state: directory
    mode: "0755"

- name: Ensure data root exists
  ansible.builtin.file:
    path: "{{ fc_data_dir }}"
    state: directory
    mode: "0755"

- name: Ensure node data directory exists
  ansible.builtin.file:
    path: "{{ fc_node_dir }}"
    state: directory
    mode: "0775"

- name: Ensure log directory exists
  ansible.builtin.file:
    path: "/var/log/testbed/{{ node_name }}"
    state: directory
    mode: "0755"

- name: Generate fc_config.json
  ansible.builtin.copy:
    dest: "{{ fc_node_dir }}/fc_config.json"
    mode: "0644"
    content: "{{ fc_config | to_json }}\n"
  vars:
    fc_config:
      node_name: "{{ node_name }}"
      fc_socket: "{{ fc_socket }}"
      fc_data_dir: "{{ fc_data_dir }}"
      fc_vcpu: "{{ fc_vcpu }}"
      fc_memory: "{{ fc_memory }}"
      fc_mac: "{{ fc_mac }}"
      tap_dev: "{{ tap_dev }}"
      fc_ipv4: "{{ fc_ipv4 }}"
      prefix4: "{{ tap_prefix4 }}"
      fc_ipv6: "{{ fc_ipv6 }}"
      prefix6: "{{ tap_prefix6 }}"
      tap_ipv4: "{{ tap_ipv4 }}"
      tap_ipv6: "{{ tap_ipv6 }}"

- name: Start Firecracker VM
  ansible.builtin.command:
    cmd: "{{ playbook_dir }}/scripts/fc_start.sh"
    chdir: "{{ fc_node_dir }}"
  changed_when: false
